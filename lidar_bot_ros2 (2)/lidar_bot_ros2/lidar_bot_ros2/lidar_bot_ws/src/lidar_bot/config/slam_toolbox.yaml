slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Режим — онлайн, асинхронный (не тормозит симуляцию)
    mode: mapping

    # Фреймы
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # Разрешение карты (м/ячейку)
    resolution: 0.05
    max_laser_range: 10.0

    # Обновление карты
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.1
    map_update_interval: 5.0
    transform_publish_period: 0.02

    # Сохранение карты при завершении (опционально)
    serialize_map_when_closing: false
